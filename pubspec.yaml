name: campusstylistflutter
description: A Flutter app for Campus Stylist.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  json_annotation: ^4.9.0
  shared_preferences: ^2.3.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.3.0 # Added go_router (latest stable version as of June 2025)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true